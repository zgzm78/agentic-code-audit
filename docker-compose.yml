services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APT_MIRROR: ${APT_MIRROR:-https://mirrors.ustc.edu.cn/debian}
        APT_SECURITY_MIRROR: ${APT_SECURITY_MIRROR:-https://mirrors.ustc.edu.cn/debian-security}
    image: agentic-code-audit-backend:local
    command: ["agentic-code-audit-backend"]
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      LLM_PROVIDER: "${LLM_PROVIDER:-deepseek}"
      LLM_API_KEY: "${LLM_API_KEY:-}"
      LLM_BASE_URL: "${LLM_BASE_URL:-https://api.deepseek.com}"
      LLM_MODEL: "${LLM_MODEL:-deepseek-v4-pro}"
      AUDIT_TOOL_TIMEOUT: "180"
      AUDIT_ALLOW_SYSTEM_SHUTDOWN: "1"
      AUDIT_SANDBOX_CONTAINER: "agentic-code-audit-sandbox"
      AUDIT_SANDBOX_IMAGE: "agentic-code-audit-sandbox:local"
      DEEPSEEK_MODEL: "deepseek-v4-pro"
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./runs:/app/runs
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - sandbox

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: agentic-code-audit-frontend:local
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      VITE_API_BASE_URL: ""
      VITE_BACKEND_PROXY: "http://backend:8000"
    depends_on:
      - backend

  sandbox:
    container_name: agentic-code-audit-sandbox
    build:
      context: .
      dockerfile: docker/sandbox/Dockerfile
      args:
        APT_MIRROR: ${APT_MIRROR:-https://mirrors.ustc.edu.cn/debian}
        APT_SECURITY_MIRROR: ${APT_SECURITY_MIRROR:-https://mirrors.ustc.edu.cn/debian-security}
    image: agentic-code-audit-sandbox:local
    network_mode: "none"
    mem_limit: 2g
    cpus: 2
    command: ["sleep", "infinity"]
    volumes:
      - ./runs:/workspace/runs
      - ./reports:/workspace/reports
